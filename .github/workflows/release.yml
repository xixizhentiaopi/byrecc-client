name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: darwin-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: darwin-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target '${{ matrix.target }}'
      - name: Package binary
        run: |
          mkdir package
          cp 'target/${{ matrix.target }}/release/byrectl' package/byrectl
          tar -C package -czf 'byrectl-${{ matrix.asset }}.tar.gz' byrectl
      - uses: actions/upload-artifact@v4
        with:
          name: byrectl-${{ matrix.asset }}
          path: byrectl-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: byrectl-*
          merge-multiple: true
          path: dist
      - name: Create signed checksums and production installer
        env:
          SIGNING_KEY: ${{ secrets.BYRECC_RELEASE_SIGNING_KEY_PEM }}
          PUBLIC_KEY: ${{ vars.BYRECC_RELEASE_PUBLIC_KEY_PEM }}
        run: |
          test -n "$SIGNING_KEY"
          test -n "$PUBLIC_KEY"
          printf '%s\n' "$SIGNING_KEY" > signing.pem
          printf '%s\n' "$PUBLIC_KEY" > release-public.pem
          (cd dist && sha256sum byrectl-*.tar.gz | sort > checksums.txt)
          openssl dgst -sha256 -sign signing.pem -out dist/checksums.sig dist/checksums.txt
          scripts/render-installer.sh release-public.pem dist/install.sh
          rm -f signing.pem release-public.pem
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' dist/* --verify-tag --generate-notes
