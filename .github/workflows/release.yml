name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: darwin-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: darwin-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target '${{ matrix.target }}'
      - name: Package binary
        run: |
          mkdir package
          cp 'target/${{ matrix.target }}/release/byrectl' package/byrectl
          tar -C package -czf 'byrectl-${{ matrix.asset }}.tar.gz' byrectl
      - uses: actions/upload-artifact@v4
        with:
          name: byrectl-${{ matrix.asset }}
          path: byrectl-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  prepare:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: byrectl-*
          merge-multiple: true
          path: dist
      - name: Create signed checksums and production installer
        env:
          SIGNING_KEY: ${{ secrets.BYRECC_RELEASE_SIGNING_KEY_PEM }}
          PUBLIC_KEY: ${{ vars.BYRECC_RELEASE_PUBLIC_KEY_PEM }}
        run: |
          umask 077
          sh scripts/verify-release-keypair.sh
          printf '%s\n' "$SIGNING_KEY" > signing.pem
          printf '%s\n' "$PUBLIC_KEY" > release-public.pem
          (cd dist && sha256sum byrectl-*.tar.gz | sort > checksums.txt)
          openssl dgst -sha256 -sign signing.pem -out dist/checksums.sig dist/checksums.txt
          openssl dgst -sha256 -verify release-public.pem \
            -signature dist/checksums.sig dist/checksums.txt
          scripts/render-installer.sh release-public.pem dist/install.sh
          cp uninstall.sh dist/uninstall.sh
          rm -f signing.pem release-public.pem
          sh -n dist/install.sh
          sh -n dist/uninstall.sh
          ! grep -q '__BYRECC_RELEASE_PUBLIC_KEY_PEM__' dist/install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create '${{ github.ref_name }}' dist/*
          --repo '${{ github.repository }}'
          --verify-tag
          --generate-notes
